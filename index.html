<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Noble Hotel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@200;300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --navy: #0d1b2a;
    --navy-mid: #111f30;
    --navy-light: #17293d;
    --gold: #c8a96e;
    --gold-light: #e8d5aa;
    --cream: #f0e8d6;
    --text: #b8a98a;
    --subtle: rgba(200,169,110,0.15);
  }
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
  html { scroll-behavior: smooth; }
  body { background: var(--navy); color: var(--text); font-family: 'Josefin Sans', sans-serif; font-weight: 300; letter-spacing: 0.04em; overflow-x: hidden; }
  .lang-bar { position: fixed; top: 0; right: 0; z-index: 200; display: flex; gap: 0; padding: 14px 60px 0 0; }
  .lang-btn { background: none; border: none; cursor: pointer; font-family: 'Josefin Sans', sans-serif; font-size: 0.6rem; letter-spacing: 0.25em; color: var(--text); opacity: 0.5; padding: 6px 10px; text-transform: uppercase; transition: opacity 0.3s, color 0.3s; }
  .lang-btn.active { opacity: 1; color: var(--gold); }
  .lang-btn:hover { opacity: 0.9; }
  .lang-sep { color: var(--subtle); line-height: 2; font-size: 0.7rem; }
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; justify-content: space-between; align-items: center; padding: 32px 60px; transition: background 0.5s, padding 0.5s; }
  nav.scrolled { background: rgba(13,27,42,0.97); backdrop-filter: blur(12px); padding: 20px 60px; border-bottom: 1px solid rgba(200,169,110,0.1); }
  .logo { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); text-decoration: none; }
  .logo span { font-style: italic; color: var(--cream); }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a { color: var(--cream); text-decoration: none; font-size: 0.62rem; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.75; transition: opacity 0.3s, color 0.3s; }
  .nav-links a:hover { opacity: 1; color: var(--gold); }
  .hero { height: 100vh; min-height: 700px; position: relative; display: flex; align-items: center; padding: 120px 60px 0; overflow: hidden; }
  .hero-bg { position: absolute; inset: 0;
    background: linear-gradient(rgba(13,27,42,0.55), rgba(13,27,42,0.75)), url('images/hero.webp') center/cover no-repeat; }
  .hero-grid { position: absolute; inset: 0; background-image: linear-gradient(rgba(200,169,110,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(200,169,110,0.04) 1px, transparent 1px); background-size: 80px 80px; }
  .hero-line { position: absolute; top: 0; left: 50%; width: 1px; height: 140px; background: linear-gradient(to bottom, transparent, var(--gold)); opacity: 0.4; }
  .hero-content { position: relative; z-index: 2; max-width: 680px; }
  .eyebrow { font-size: 0.6rem; letter-spacing: 0.45em; color: var(--gold); text-transform: uppercase; margin-bottom: 28px; display: flex; align-items: center; gap: 18px; }
  .eyebrow::before { content:''; width:40px; height:1px; background:var(--gold); display:block; }
  .hero h1 { font-family: 'Cormorant Garamond', serif; font-size: clamp(3.5rem, 8vw, 7.5rem); font-weight: 300; line-height: 0.95; color: var(--cream); margin-bottom: 8px; }
  .hero h1 em { font-style: italic; color: var(--gold); display: block; }
  .hero-sub { font-size: 0.8rem; line-height: 1.9; max-width: 400px; margin: 32px 0 52px; opacity: 0.7; }
  .hero-actions { display: flex; gap: 24px; align-items: center; }
  .btn-gold { background: var(--gold); color: var(--navy); padding: 16px 44px; text-decoration: none; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; font-family: 'Josefin Sans', sans-serif; font-weight: 400; transition: background 0.3s, transform 0.2s; display: inline-block; }
  .btn-gold:hover { background: var(--gold-light); transform: translateY(-1px); }
  .btn-outline { color: var(--cream); text-decoration: none; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; border-bottom: 1px solid rgba(240,232,214,0.3); padding-bottom: 3px; transition: color 0.3s, border-color 0.3s; }
  .btn-outline:hover { color: var(--gold); border-color: var(--gold); }
  .hero-aside { position: absolute; right: 60px; bottom: 90px; display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .hero-aside .big { font-family: 'Cormorant Garamond', serif; font-size: 5rem; font-weight: 300; color: var(--gold); line-height: 1; opacity: 0.7; }
  .hero-aside .small { font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; opacity: 0.45; }
  .numbers-strip { display: flex; border-top: 1px solid var(--subtle); border-bottom: 1px solid var(--subtle); }
  .num-item { flex: 1; padding: 44px 40px; border-right: 1px solid var(--subtle); text-align: center; }
  .num-item:last-child { border-right: none; }
  .num-item .n { font-family: 'Cormorant Garamond', serif; font-size: 3.2rem; font-weight: 300; color: var(--cream); display: block; line-height: 1; }
  .num-item .n em { font-style: italic; color: var(--gold); }
  .num-item .l { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; margin-top: 8px; opacity: 0.5; display: block; }
  .section { padding: 120px 60px; }
  .section-head { margin-bottom: 64px; }
  .section-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(2.2rem, 4vw, 3.8rem); font-weight: 300; color: var(--cream); line-height: 1.1; }
  .section-title em { font-style: italic; color: var(--gold); }
  .section-sub { font-size: 0.78rem; line-height: 1.9; max-width: 480px; margin-top: 16px; opacity: 0.65; }
  .rooms-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 2px; background: var(--subtle); }
  .room-card { background: var(--navy-mid); padding: 52px 44px 44px; position: relative; overflow: hidden; transition: background 0.4s; cursor: pointer; }
  /* ROOM IMAGE: replace placeholder div with: <div class="room-img"><img src="images/room1.jpg" alt="..."></div> */
  .room-img { height: 200px; margin: -52px -44px 36px; overflow: hidden; }
  .room-img picture { display: block; width: 100%; height: 100%; }
  .room-img img { width: 100%; height: 100%; object-fit: cover; display: block; }
  .room-img-placeholder { height: 200px; margin: -52px -44px 36px; background: var(--navy-light); border-bottom: 1px solid var(--subtle); display: flex; align-items: center; justify-content: center; font-size: 0.58rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); opacity: 0.4; }
  .room-card:hover { background: var(--navy-light); }
  .room-card::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 2px; background: var(--gold); transform: scaleX(0); transform-origin: left; transition: transform 0.4s ease; }
  .room-card:hover::after { transform: scaleX(1); }
  .room-no { font-family: 'Cormorant Garamond', serif; font-size: 4.5rem; font-weight: 300; line-height: 1; color: rgba(200,169,110,0.1); display: block; margin-bottom: -8px; }
  .room-type { font-size: 0.58rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); margin-bottom: 14px; }
  .room-name { font-family: 'Cormorant Garamond', serif; font-size: 1.9rem; font-weight: 300; color: var(--cream); margin-bottom: 16px; line-height: 1.15; }
  .room-desc { font-size: 0.75rem; line-height: 1.85; opacity: 0.6; margin-bottom: 36px; }
  .room-features { display: flex; gap: 18px; margin-bottom: 32px; flex-wrap: wrap; }
  .room-tag { font-size: 0.58rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; border: 1px solid rgba(200,169,110,0.2); padding: 5px 12px; }
  .room-footer { display: flex; justify-content: space-between; align-items: flex-end; }
  .room-price .from { font-size: 0.6rem; letter-spacing: 0.15em; text-transform: uppercase; opacity: 0.5; display: block; margin-bottom: 4px; }
  .room-price .amount { font-family: 'Cormorant Garamond', serif; font-size: 2rem; font-weight: 300; color: var(--cream); line-height: 1; }
  .room-price .night { font-size: 0.65rem; opacity: 0.5; margin-left: 4px; }
  .room-link { width: 44px; height: 44px; border: 1px solid rgba(200,169,110,0.3); display: flex; align-items: center; justify-content: center; color: var(--gold); font-size: 1rem; transition: background 0.3s, transform 0.3s; text-decoration: none; }
  .room-card:hover .room-link { background: var(--gold); color: var(--navy); transform: rotate(45deg); }
  .experience { padding: 120px 60px; background: var(--navy-mid); border-top: 1px solid var(--subtle); border-bottom: 1px solid var(--subtle); }
  .exp-layout { display: grid; grid-template-columns: 1fr 1.1fr; gap: 100px; align-items: center; margin-top: 64px; }
  .amenities-list { display: flex; flex-direction: column; gap: 0; }
  .amenity { display: flex; gap: 28px; align-items: flex-start; padding: 28px 0; border-bottom: 1px solid var(--subtle); }
  .amenity:first-child { border-top: 1px solid var(--subtle); }
  .amenity-icon { width: 42px; height: 42px; flex-shrink: 0; border: 1px solid rgba(200,169,110,0.3); display: flex; align-items: center; justify-content: center; font-size: 1rem; color: var(--gold); }
  .amenity-text h4 { font-family: 'Cormorant Garamond', serif; font-size: 1.15rem; font-weight: 300; color: var(--cream); margin-bottom: 6px; }
  .amenity-text p { font-size: 0.73rem; line-height: 1.8; opacity: 0.6; }
  .exp-quote { position: relative; padding: 64px; background: var(--navy-light); border: 1px solid var(--subtle); }
  .exp-quote::before { content: '"'; position: absolute; top: 24px; left: 40px; font-family: 'Cormorant Garamond', serif; font-size: 8rem; line-height: 1; color: var(--gold); opacity: 0.2; }
  .quote-text { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; font-weight: 300; font-style: italic; color: var(--cream); line-height: 1.5; margin-bottom: 32px; position: relative; z-index: 1; }
  .quote-author { font-size: 0.62rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); opacity: 0.8; }
  .quote-stars { color: var(--gold); margin-bottom: 20px; letter-spacing: 4px; }
  .exp-cta { margin-top: 40px; padding-top: 40px; border-top: 1px solid var(--subtle); }
  .exp-cta p { font-size: 0.75rem; opacity: 0.6; margin-bottom: 20px; line-height: 1.8; }
  .location { padding: 120px 60px; }
  .location-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2px; margin-top: 64px; background: var(--subtle); }
  .loc-info { background: var(--navy-mid); padding: 64px 60px; display: flex; flex-direction: column; gap: 40px; }
  .loc-detail { display: flex; flex-direction: column; gap: 8px; }
  .loc-label { font-size: 0.58rem; letter-spacing: 0.35em; text-transform: uppercase; color: var(--gold); }
  .loc-value { font-family: 'Cormorant Garamond', serif; font-size: 1.2rem; font-weight: 300; color: var(--cream); line-height: 1.5; }
  .loc-value a { color: var(--gold); text-decoration: none; }
  .loc-map { background: var(--navy-light); min-height: 400px; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; }
  .loc-map::before { content: ''; position: absolute; inset: 0; background-image: linear-gradient(rgba(200,169,110,0.06) 1px, transparent 1px), linear-gradient(90deg, rgba(200,169,110,0.06) 1px, transparent 1px); background-size: 40px 40px; }
  .map-pin { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); width: 16px; height: 16px; background: var(--gold); border-radius: 50%; box-shadow: 0 0 0 8px rgba(200,169,110,0.15), 0 0 0 24px rgba(200,169,110,0.06); z-index: 2; }
  .map-placeholder { text-align: center; padding: 40px; }
  .map-placeholder .map-icon { font-size: 3rem; margin-bottom: 20px; opacity: 0.3; }
  .map-placeholder p { font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; opacity: 0.4; }
  .reserve-strip { padding: 100px 60px; background: var(--navy-mid); text-align: center; border-top: 1px solid var(--subtle); }
  .reserve-strip h2 { font-family: 'Cormorant Garamond', serif; font-size: clamp(2rem, 5vw, 4rem); font-weight: 300; color: var(--cream); margin-bottom: 16px; line-height: 1.1; }
  .reserve-strip h2 em { font-style: italic; color: var(--gold); }
  .reserve-strip p { font-size: 0.78rem; opacity: 0.6; max-width: 440px; margin: 0 auto 48px; line-height: 1.9; }
  .reserve-form { display: flex; gap: 2px; max-width: 700px; margin: 0 auto; }
  .reserve-form input { flex: 1; background: var(--navy-light); border: 1px solid var(--subtle); color: var(--cream); padding: 18px 24px; font-family: 'Josefin Sans', sans-serif; font-size: 0.7rem; letter-spacing: 0.1em; outline: none; transition: border-color 0.3s; }
  .reserve-form input::placeholder { opacity: 0.4; }
  .reserve-form input:focus { border-color: var(--gold); }
  .reserve-form button { background: var(--gold); border: none; cursor: pointer; padding: 18px 44px; font-family: 'Josefin Sans', sans-serif; font-size: 0.65rem; letter-spacing: 0.25em; text-transform: uppercase; color: var(--navy); font-weight: 400; transition: background 0.3s; }
  .reserve-form button:hover { background: var(--gold-light); }
  footer { padding: 64px 60px 40px; border-top: 1px solid var(--subtle); }
  .footer-top { display: grid; grid-template-columns: 1.5fr 1fr 1fr 1fr; gap: 60px; margin-bottom: 60px; }
  .footer-brand .logo { display: block; margin-bottom: 20px; font-size: 1.1rem; }
  .footer-brand p { font-size: 0.73rem; line-height: 1.9; opacity: 0.55; max-width: 260px; }
  .footer-col h5 { font-size: 0.6rem; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 20px; }
  .footer-col ul { list-style: none; display: flex; flex-direction: column; gap: 12px; }
  .footer-col ul a { color: var(--text); text-decoration: none; font-size: 0.73rem; opacity: 0.65; transition: opacity 0.3s, color 0.3s; }
  .footer-col ul a:hover { opacity: 1; color: var(--gold); }
  .footer-bottom { display: flex; justify-content: space-between; align-items: center; padding-top: 32px; border-top: 1px solid var(--subtle); }
  .footer-bottom p { font-size: 0.62rem; opacity: 0.35; }
  .footer-socials { display: flex; gap: 20px; }
  .footer-socials a { width: 36px; height: 36px; border: 1px solid var(--subtle); display: flex; align-items: center; justify-content: center; color: var(--text); text-decoration: none; font-size: 0.7rem; transition: border-color 0.3s, color 0.3s; }
  .footer-socials a:hover { border-color: var(--gold); color: var(--gold); }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
  .hero-content > * { animation: fadeUp 0.9s ease both; }
  .hero-content > *:nth-child(1) { animation-delay: 0.1s; }
  .hero-content > *:nth-child(2) { animation-delay: 0.25s; }
  .hero-content > *:nth-child(3) { animation-delay: 0.4s; }
  .hero-content > *:nth-child(4) { animation-delay: 0.55s; }
  [data-lang] { display: none; }
  [data-lang].active { display: block; }
  @media (max-width: 900px) {
    nav { padding: 24px; } .lang-bar { padding: 14px 24px 0 0; } .nav-links { display: none; }
    .hero { padding: 0 24px 80px; } .section, .experience, .location, .reserve-strip { padding: 80px 24px; }
    .rooms-grid, .location-grid, .footer-top { grid-template-columns: 1fr; }
    .exp-layout { grid-template-columns: 1fr; gap: 60px; } .reserve-form { flex-direction: column; }
    .hero-aside { display: none; } .numbers-strip { flex-wrap: wrap; } .num-item { min-width: 50%; }
  }
</style>
</head>
<body>

<div class="lang-bar">
  <button class="lang-btn active" onclick="setLang('en')">EN</button>
  <span class="lang-sep">·</span>
  <button class="lang-btn" onclick="setLang('de')">DE</button>
  <span class="lang-sep">·</span>
  <button class="lang-btn" onclick="setLang('es')">ES</button>
</div>

<nav id="mainNav">
  <a href="#" class="logo">Noble <span>Hotel</span></a>
  <ul class="nav-links">
    <li><a href="#rooms" data-i18n="nav.rooms"></a></li>
    <li><a href="#experience" data-i18n="nav.experience"></a></li>
    <li><a href="#location" data-i18n="nav.location"></a></li>
  </ul>
</nav>

<section class="hero">
  <div class="hero-bg"></div>
  <div class="hero-grid"></div>
  <div class="hero-line"></div>
  <div class="hero-content">
    <p class="eyebrow" data-i18n="hero.eyebrow"></p>
    <h1><span data-i18n="hero.h1a"></span><em data-i18n="hero.h1b"></em></h1>
    <p class="hero-sub" data-i18n="hero.sub"></p>
    <div class="hero-actions">
      <a href="#reserve" class="btn-gold" data-i18n="hero.cta1"></a>
      <a href="#rooms" class="btn-outline" data-i18n="hero.cta2"></a>
    </div>
  </div>
  <div class="hero-aside">
    <span class="big">IV★</span>
    <span class="small" data-i18n="hero.stars"></span>
  </div>
</section>

<div class="numbers-strip">
  <div class="num-item"><span class="n">42</span><span class="l" data-i18n="stats.rooms"></span></div>
  <div class="num-item"><span class="n">3</span><span class="l" data-i18n="stats.restaurants"></span></div>
  <div class="num-item"><span class="n">1<em>ha</em></span><span class="l" data-i18n="stats.garden"></span></div>
  <div class="num-item"><span class="n">24<em>h</em></span><span class="l" data-i18n="stats.service"></span></div>
</div>

<section class="section" id="rooms">
  <div class="section-head">
    <p class="eyebrow" data-i18n="rooms.eyebrow"></p>
    <h2 class="section-title"><span data-i18n="rooms.title"></span> <em data-i18n="rooms.title2"></em></h2>
    <p class="section-sub" data-i18n="rooms.sub"></p>
  </div>
  <div class="rooms-grid">
    <div class="room-card">
      <div class="room-img"><picture><source srcset="images/room1.webp" type="image/webp"><img src="images/room1.jpg" alt="Garden View" loading="lazy"></picture></div>
      <span class="room-no">01</span>
      <div class="room-type" data-i18n="room1.type"></div>
      <h3 class="room-name" data-i18n="room1.name"></h3>
      <p class="room-desc" data-i18n="room1.desc"></p>
      <div class="room-features">
        <span class="room-tag">32 m²</span>
        <span class="room-tag" data-i18n="room.wifi"></span>
        <span class="room-tag" data-i18n="room.breakfast"></span>
      </div>
      <div class="room-footer">
        <div class="room-price"><span class="from" data-i18n="room.from"></span><span class="amount">€180<span class="night" data-i18n="room.night"></span></span></div>
        <a href="#reserve" class="room-link">→</a>
      </div>
    </div>
    <div class="room-card">
      <div class="room-img"><picture><source srcset="images/room2.webp" type="image/webp"><img src="images/room2.jpg" alt="Grand Suite" loading="lazy"></picture></div>
      <span class="room-no">02</span>
      <div class="room-type" data-i18n="room2.type"></div>
      <h3 class="room-name" data-i18n="room2.name"></h3>
      <p class="room-desc" data-i18n="room2.desc"></p>
      <div class="room-features">
        <span class="room-tag">54 m²</span>
        <span class="room-tag" data-i18n="room.wifi"></span>
        <span class="room-tag" data-i18n="room.spa"></span>
      </div>
      <div class="room-footer">
        <div class="room-price"><span class="from" data-i18n="room.from"></span><span class="amount">€290<span class="night" data-i18n="room.night"></span></span></div>
        <a href="#reserve" class="room-link">→</a>
      </div>
    </div>
    <div class="room-card">
      <div class="room-img"><picture><source srcset="images/room3.webp" type="image/webp"><img src="images/room3.jpg" alt="Noble Suite" loading="lazy"></picture></div>
      <span class="room-no">03</span>
      <div class="room-type" data-i18n="room3.type"></div>
      <h3 class="room-name" data-i18n="room3.name"></h3>
      <p class="room-desc" data-i18n="room3.desc"></p>
      <div class="room-features">
        <span class="room-tag">88 m²</span>
        <span class="room-tag" data-i18n="room.butler"></span>
        <span class="room-tag" data-i18n="room.terrace"></span>
      </div>
      <div class="room-footer">
        <div class="room-price"><span class="from" data-i18n="room.from"></span><span class="amount">€520<span class="night" data-i18n="room.night"></span></span></div>
        <a href="#reserve" class="room-link">→</a>
      </div>
    </div>
  </div>
</section>

<section class="experience" id="experience">
  <div class="section-head">
    <p class="eyebrow" data-i18n="exp.eyebrow"></p>
    <h2 class="section-title"><span data-i18n="exp.title"></span> <em data-i18n="exp.title2"></em></h2>
  </div>
  <div class="exp-layout">
    <div class="amenities-list">
      <div class="amenity"><div class="amenity-icon">◈</div><div class="amenity-text"><h4 data-i18n="amen1.title"></h4><p data-i18n="amen1.desc"></p></div></div>

let currentLang = 'en';
function setLang(lang) {
  currentLang = lang;
  document.querySelectorAll('.lang-btn').forEach(btn => btn.classList.toggle('active', btn.textContent === lang.toUpperCase()));
  document.querySelectorAll('[data-i18n]').forEach(el => { const k = el.getAttribute('data-i18n'); if (i18n[lang][k]) el.textContent = i18n[lang][k]; });
  document.querySelectorAll('[data-i18n-placeholder]').forEach(el => { const k = el.getAttribute('data-i18n-placeholder'); if (i18n[lang][k]) el.placeholder = i18n[lang][k]; });
  document.documentElement.lang = lang;
}
